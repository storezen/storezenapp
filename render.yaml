services:
  - name: storezen-api
    type: web
    region: oregon
    buildCommand: pnpm install && pnpm --filter @storepk/api run build
    postDeployCommand: cd apps/api && pnpm run db:push
    startCommand: node apps/api/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

databases:
  - name: storezen-db
    plan: free
    region: oregon