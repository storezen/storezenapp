kind = "web"
previewPath = "/"
title = "PK Store - TikTok Storefront"
version = "1.0.0"
id = "artifacts/pk-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24385

[services.development]
run = "pnpm --filter @workspace/pk-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pk-store", "run", "build" ]
publicDir = "artifacts/pk-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24385"
BASE_PATH = "/"
