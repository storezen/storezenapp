services:
  - name: storezen-api
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:api
    startCommand: node apps/api/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - name: storezen-web
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:web
    startCommand: pnpm --filter @storepk/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080

databases:
  - name: storezen-db
    plan: free
    region: oregon