preBuildCommand: pnpm install --frozen-lockfile

services:
  - name: storezen-api
    type: web
    region: oregon
    buildCommand: pnpm --filter @storepk/api run build
    startCommand: node apps/api/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

  - name: storezen-web
    type: web
    region: oregon
    buildCommand: pnpm --filter @storepk/web run build
    startCommand: pnpm --filter @storepk/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: "https://storezen-api.onrender.com"

databases:
  - name: storezen-db
    plan: free
    region: oregon