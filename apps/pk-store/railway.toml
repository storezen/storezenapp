# Storefront (Vite) ‚Äî `@workspace/pk-store` in `apps/pk-store`.
# Railway **Root directory:** `apps/pk-store`

[build]
builder = "RAILPACK"
buildCommand = "cd ../.. && corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install && pnpm --filter @workspace/pk-store build"

[deploy]
startCommand = "cd ../.. && pnpm --filter @workspace/pk-store start"
healthcheckPath = "/"
