# Railway: create one service, point it at this file from the repository root.
# In the dashboard set Root Directory to empty (.) so the whole monorepo is available.
# Build uses Dockerfile.api so workspace packages install correctly.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = ["Dockerfile.api", "railway.toml", "pnpm-lock.yaml", "pnpm-workspace.yaml", "apps/api/**", "packages/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
