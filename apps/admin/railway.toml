# Monorepo: set Railway service **Root directory** to `apps/admin` (full repo is still cloned).
# Build runs from this folder, so we `cd` to the repo root for pnpm workspace.

[build]
builder = "RAILPACK"
buildCommand = "cd ../.. && corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install && pnpm --filter @workspace/admin build"

[deploy]
startCommand = "cd ../.. && pnpm --filter @workspace/admin start"
healthcheckPath = "/"
