# Alternate API deploy: Railway Root Directory = `apps/api`.
# Recommended production path: repo root + root `railway.toml` + `Dockerfile.api`
# (full pnpm workspace). See DEPLOYMENT.md.

[build]
builder = "nixpacks"
buildCommand = "cd ../.. && corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps dist/index.mjs"
