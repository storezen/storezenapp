services:
  - type: web
    name: storezen-api
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:api
    startCommand: node apps/api/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: storezen-web
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:web
    startCommand: node apps/web/.next/standalone/apps/web/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080

databases:
  - name: storezen-db
    plan: free
    region: oregon
    postgresVersion: 16