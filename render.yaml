services:
  # API Backend
  - name: storezen-api
    env: node
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:api
    startCommand: node apps/api/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: storezen-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGINS
        value: https://storezen.onrender.com
    scaling:
      minInstances: 1
      maxInstances: 1

  # Web Frontend
  - name: storezen-web
    env: static
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:web
    outputDir: apps/web/.next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://storezen-api.onrender.com/api
      - key: NEXT_PUBLIC_STORE_SLUG
        value: demo

databases:
  - name: storezen-db
    plan: free
    region: oregon
    postgresVersion: 16